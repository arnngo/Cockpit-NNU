<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>NNU · Cockpit de Portfólio — Urbanismo</title>
<style>
:root{
  --display:system-ui,'Segoe UI Variable Display','Segoe UI',-apple-system,BlinkMacSystemFont,'Inter','Roboto','Helvetica Neue',Arial,sans-serif;
  --body:system-ui,'Segoe UI Variable Text','Segoe UI',-apple-system,BlinkMacSystemFont,'Inter','Roboto','Helvetica Neue',Arial,sans-serif;
  --mono:ui-monospace,'Cascadia Code','Segoe UI Mono','SF Mono',Consolas,monospace;
}
[data-theme="light"]{--bg:#F5F6F8;--bg2:#EEF0F3;--surface:#FFF;--surface2:#F2F4F7;--line:#E4E7EC;--line2:#D2D7DE;--ink:#171A1F;--ink-mid:#525965;--ink-dim:#8A919C;--accent:#1B3A6B;--accent-dim:#8DA1C2;--on-accent:#FFF;--accent-soft:rgba(27,58,107,.10);--green:#2E9E5B;--amber:#C9821A;--red:#CE4242;--green-soft:rgba(46,158,91,.12);--amber-soft:rgba(201,130,26,.13);--red-soft:rgba(206,66,66,.12);--shadow:0 1px 2px rgba(20,25,35,.05),0 4px 14px rgba(20,25,35,.05)}
[data-theme="dark"]{--bg:#0E1411;--bg2:#121A15;--surface:#141C17;--surface2:#1C261F;--line:#26322A;--line2:#34423A;--ink:#E7EFE9;--ink-mid:#A4B2A8;--ink-dim:#6B7B70;--accent:#6FC48D;--accent-dim:#356B4A;--on-accent:#0B130E;--accent-soft:rgba(111,196,141,.17);--green:#62C07E;--amber:#E0A23F;--red:#E0685A;--green-soft:rgba(95,185,122,.16);--amber-soft:rgba(224,162,63,.15);--red-soft:rgba(224,104,90,.16);--shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.28)}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14.5px;line-height:1.55;letter-spacing:-.003em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
h1,h2,h3,.det-head h2,.card .cname,.sectlabel h2{letter-spacing:-.015em}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
.lbl{font-family:var(--body);letter-spacing:.09em;text-transform:uppercase}
.shell{max-width:1200px;margin:0 auto;padding:0 22px 90px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 0 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:linear-gradient(180deg,var(--bg) 82%,transparent);z-index:40}
.brand{display:flex;align-items:baseline;gap:12px}
.brand .mark{font-family:var(--body);font-weight:600;letter-spacing:.16em;font-size:11px;color:var(--on-accent);background:var(--accent);padding:4px 9px;border-radius:4px}
.brand h1{font-family:var(--display);font-weight:600;font-size:15px;margin:0}
.brand .sub{font-size:10.5px;color:var(--ink-dim);letter-spacing:.1em;text-transform:uppercase}
.toolbtns{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.tbtn{background:var(--surface);border:1px solid var(--line2);color:var(--ink-mid);padding:6px 11px;border-radius:7px;font-size:12px;transition:.15s}
.tbtn:hover{border-color:var(--accent);color:var(--ink)}
.tbtn.lock{border-color:var(--accent);color:var(--accent)}
.eyebrow{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-dim)}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:22px 0 0;box-shadow:var(--shadow)}
.kpi{background:var(--surface);padding:14px 14px 13px}
.kpi .label{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-dim);line-height:1.3}
.kpi .val{font-family:var(--mono);font-weight:600;font-size:25px;margin-top:6px;line-height:1}
.kpi .val small{font-size:12px;color:var(--ink-dim);font-weight:400}
.kpi .foot{font-size:10.5px;color:var(--ink-mid);margin-top:4px}
.bar{height:7px;border-radius:5px;background:var(--surface2);overflow:hidden}
.bar>i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent-dim),var(--accent))}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.g{background:var(--green)}.dot.y{background:var(--amber)}.dot.r{background:var(--red)}
.sectlabel{display:flex;align-items:center;justify-content:space-between;margin:26px 0 12px}
.sectlabel h2{font-family:var(--display);font-weight:600;font-size:15px;margin:0}
.legend{font-size:10.5px;color:var(--ink-dim);letter-spacing:.02em}
.split{display:grid;grid-template-columns:1.15fr 1fr;gap:16px;align-items:start}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px 16px;box-shadow:var(--shadow)}
.panel h3{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);margin:0 0 12px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.prio{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-top:1px solid var(--line);font-size:13px}
.prio:first-child{border-top:none}
.prio .rk{font-family:var(--mono);font-size:11px;color:var(--ink-dim);min-width:14px}
.prio .pn b{font-weight:600}.prio .pn small{display:block;color:var(--ink-mid);font-size:11.5px;margin-top:1px}
.prio .pd{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:600;white-space:nowrap}
.kofi{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--line);font-size:12.5px}
.kofi:first-child{border-top:none}.kofi .kn{color:var(--ink-mid)}.kofi .kv{font-family:var(--mono);font-weight:600}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:13px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px 15px 13px;cursor:pointer;transition:.16s;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card .stripe{position:absolute;left:0;top:0;bottom:0;width:3px}
.card .chead{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card .cname{font-family:var(--display);font-weight:600;font-size:15px;line-height:1.2}
.card .ccode{font-family:var(--mono);font-size:10px;color:var(--ink-dim);letter-spacing:.06em;margin-top:3px}
.card .cpct{font-family:var(--mono);font-weight:600;font-size:20px;line-height:1;text-align:right}
.card .cpct small{font-size:10px;color:var(--ink-dim);display:block;font-weight:400;letter-spacing:.04em;font-family:var(--body)}
.card .cmeta{display:flex;justify-content:space-between;margin-top:11px;font-size:11.5px;color:var(--ink-mid);gap:8px}
.card .cmeta b{color:var(--ink);font-weight:600}
.chip{font-size:10.5px;letter-spacing:.02em;padding:3px 9px;border-radius:20px;border:1px solid var(--line2);color:var(--ink-mid);display:inline-flex;align-items:center;gap:5px;margin-top:9px}
.calert{margin-top:9px;font-size:11px;color:var(--amber);background:var(--amber-soft);border-radius:6px;padding:5px 8px;display:flex;gap:6px;align-items:center}
.calert.r{color:var(--red);background:var(--red-soft)}
.calert .mk{font-weight:700}
.back{background:var(--surface);border:1px solid var(--line2);color:var(--accent);font-size:12.5px;font-weight:600;padding:6px 13px;margin:22px 0 8px;display:inline-flex;gap:7px;align-items:center;border-radius:8px;box-shadow:var(--shadow)}
.back:hover{border-color:var(--accent);background:var(--accent-soft)}
.det-head{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;margin:4px 0 16px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.det-head h2{font-family:var(--display);font-weight:600;font-size:24px;margin:3px 0 0}
.det-head .meta{font-size:11.5px;color:var(--ink-mid);margin-top:5px}
.det-big{display:flex;align-items:baseline;gap:13px}
.det-big .num{font-family:var(--mono);font-weight:600;font-size:38px;line-height:.9}
.det-big .num small{font-size:15px;color:var(--ink-dim)}
.det-big .stat{font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:5px 11px;border-radius:20px;font-weight:600}
.gates{display:flex;gap:0;margin:4px 0 18px;position:relative;overflow-x:auto;padding-bottom:4px}
.gate{flex:1;min-width:62px;text-align:center;position:relative;padding-top:22px}
.gate::before{content:"";position:absolute;top:6px;left:50%;width:100%;height:2px;background:var(--line2)}
.gate:last-child::before{display:none}
.gate .gm{position:absolute;top:0;left:50%;transform:translateX(-50%);width:13px;height:13px;border-radius:50%;background:var(--surface);border:2px solid var(--line2)}
.gate.done .gm{background:var(--green);border-color:var(--green)}
.gate.curr .gm{background:var(--amber);border-color:var(--amber);box-shadow:0 0 0 4px var(--amber-soft)}
.gate.prod .gm{border-style:dashed}
.gate .gl{font-size:8.5px;letter-spacing:.01em;color:var(--ink-dim);margin-top:3px;line-height:1.2;padding:0 2px}
.gate.done .gl,.gate.curr .gl{color:var(--ink-mid)}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:6px 0 16px;flex-wrap:wrap}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--ink-dim);padding:8px 13px;font-size:13px;margin-bottom:-1px}
.tab:hover{color:var(--ink)}.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab .b{font-family:var(--mono);font-size:10px;background:var(--accent-soft);color:var(--accent);border-radius:10px;padding:1px 6px;margin-left:5px}
.subgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
.bigblk{display:flex;align-items:baseline;gap:10px}.bigblk .n{font-family:var(--mono);font-weight:600;font-size:30px}
.miss{margin:0;padding:0}.miss li{list-style:none;font-size:12.5px;color:var(--ink-mid);padding:5px 0;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center}
.miss .bx{width:12px;height:12px;border:1.5px solid var(--ink-dim);border-radius:3px;flex:none}.miss .bx.abs{border-color:var(--red)}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--line);font-size:13px}
.row:first-child{border-top:none}.row .sub{font-size:11px;color:var(--ink-dim)}
.row .d{font-family:var(--mono);font-weight:600}.row .d.r{color:var(--red)}.row .d.y{color:var(--amber)}
.empty{font-size:12.5px;color:var(--ink-dim);font-style:italic}
.faseblk{margin-bottom:14px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow)}
.faseblk .fh{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg2);cursor:pointer}
.faseblk .fh .fl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-mid);display:flex;gap:9px;align-items:center;font-weight:600}
.faseblk .fh .chev{color:var(--ink-dim);transition:.15s}.faseblk.col .fh .chev{transform:rotate(-90deg)}
.faseblk .fh .gt{font-size:9px;background:var(--accent-soft);color:var(--accent);padding:2px 7px;border-radius:5px;letter-spacing:.03em;font-weight:600}
.faseblk .fh .fp{font-family:var(--mono);font-size:11px;color:var(--ink)}
.faseblk .mini{height:4px;background:var(--surface2)}.faseblk .mini>i{display:block;height:100%;background:var(--accent)}
.faseblk.col .ent{display:none}
.ent{border-top:1px solid var(--line)}
.ent .eh{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer}
.ent .eh:hover{background:var(--bg2)}
.ent .eh .en{flex:1;font-size:13px}.ent .eh .en.na{color:var(--ink-dim);text-decoration:line-through}
.ent .eh .tags{display:inline-flex;gap:4px;margin-left:6px;vertical-align:1px}
.tag{font-size:9.5px;padding:1px 6px;border-radius:4px;border:1px solid var(--line2);color:var(--ink-dim);letter-spacing:.02em}
.tag.abs{border-color:var(--red);color:var(--red)}.tag.opc{color:var(--ink-dim)}
.tag.aguarda{border-color:var(--amber);color:var(--amber)}.tag.aguarda.atraso{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.tag.blq{border-color:var(--red);color:var(--red);background:var(--red-soft)}
.ent .eh .ep{font-family:var(--mono);font-size:12px;color:var(--ink-mid);min-width:34px;text-align:right}
.passos{padding:4px 14px 12px 14px;background:var(--bg2)}
.passo{display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid var(--line)}
.passo .pn{flex:1;font-size:12.5px}.passo .pn .pd{font-family:var(--mono);font-size:9.5px;color:var(--ink-dim);margin-left:6px}
.passo .pst{font-size:11px;font-weight:600;min-width:108px;text-align:right}
.seg{display:inline-flex;border:1px solid var(--line2);border-radius:7px;overflow:hidden;flex:none}
.seg button{background:var(--surface);border:none;color:var(--ink-dim);font-size:11px;font-family:var(--mono);padding:4px 8px;border-right:1px solid var(--line2)}
.seg button:last-child{border-right:none}.seg button:hover{color:var(--ink);background:var(--bg2)}
.seg button.on-e{background:var(--accent);color:var(--on-accent)}
.seg button.on-w{background:var(--amber);color:#15140F}.seg button.on-x{background:var(--red);color:#fff}.seg button.on-o{background:var(--green);color:#fff}
.orgbox{margin:2px 0 4px 0;padding:8px 10px;background:var(--amber-soft);border-radius:8px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.orgbox.atraso,.orgbox.exig{background:var(--red-soft)}
.fld{display:flex;flex-direction:column;gap:3px}.fld label{font-size:9px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-dim)}
.fld input{background:var(--surface);border:1px solid var(--line2);color:var(--ink);border-radius:6px;padding:5px 8px;font-size:12px}
.fld input[type=date]{font-family:var(--mono);color-scheme:light}[data-theme=dark] .fld input[type=date]{color-scheme:dark}
.fld input.w-sla{width:62px}.fld input.w-org{width:150px}
.sla-read{font-family:var(--mono);font-size:11px;font-weight:600;padding:5px 0}
.deptsel{font-family:var(--mono);font-size:10px;color:var(--ink-mid);border:1px solid var(--line2);border-radius:5px;padding:1px 4px;background:var(--surface);margin-left:6px;max-width:140px}
.entfoot{display:flex;gap:14px;flex-wrap:wrap;padding:6px 0 2px;border-top:1px dashed var(--line);margin-top:6px;font-size:11px}
.entfoot button{background:none;border:1px solid var(--line2);color:var(--ink-mid);border-radius:6px;padding:4px 9px;font-size:11px}
.entfoot button:hover{border-color:var(--accent);color:var(--ink)}.entfoot button.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.notein{width:100%;margin-top:6px;background:var(--surface);border:1px solid var(--line2);color:var(--ink);border-radius:6px;padding:6px 9px;font-size:12px;font-family:var(--body)}
.noteline{font-size:11.5px;color:var(--ink-mid);margin:0 0 4px 2px}
.semana .sw{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--line)}
.semana .sw:first-child{border-top:none}
.semana .pr{font-size:9px;padding:2px 7px;border-radius:5px;white-space:nowrap;margin-top:1px;letter-spacing:.04em;text-transform:uppercase;font-weight:600}
.pr.critica{background:var(--red-soft);color:var(--red)}.pr.alta{background:var(--amber-soft);color:var(--amber)}.pr.media{background:var(--accent-soft);color:var(--accent)}.pr.baixa{background:var(--surface2);color:var(--ink-dim)}
.semana .sb{flex:1}.semana .sb .st{font-size:13px}.semana .sb .ss{font-size:11px;color:var(--ink-dim);margin-top:2px}
.semana .sx{background:none;border:none;color:var(--ink-dim);font-size:14px;padding:0 4px}.semana .sx:hover{color:var(--red)}
.addbtn{background:var(--accent);border:1px solid var(--accent);color:var(--on-accent);border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;margin-top:12px}
.risks .rr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--line);font-size:13px}
.risks .rr:first-child{border-top:none}.rp{display:flex;gap:5px}
.rp span{width:18px;height:18px;border-radius:50%;border:1px solid var(--line2);cursor:pointer;opacity:.3;transition:.12s}.rp span:hover{opacity:.65}.rp span.on{opacity:1;border-color:var(--ink)}
.rp.ro span{cursor:default}.rp.ro span:hover{opacity:.3}.rp.ro span.on{opacity:1}
.rp .g{background:var(--green)}.rp .y{background:var(--amber)}.rp .r{background:var(--red)}
.foot{font-size:11px;color:var(--ink-dim);margin-top:30px;border-top:1px solid var(--line);padding-top:14px;line-height:1.7}
.foot code{font-family:var(--mono);font-size:10.5px;background:var(--surface2);padding:1px 5px;border-radius:4px;color:var(--accent)}
.ro-note{font-size:11px;color:var(--ink-dim);background:var(--surface2);border:1px solid var(--line);border-radius:7px;padding:7px 11px;margin:14px 0 0;display:flex;gap:7px;align-items:center}
.prio-pill{font-family:var(--mono);font-size:10px;background:var(--accent);color:var(--on-accent);border:none;border-radius:5px;padding:2px 7px;cursor:pointer;letter-spacing:.03em}
.prio-pill.def{background:transparent;border:1px dashed var(--line2);color:var(--ink-dim)}
.prio-pill.def:hover{border-color:var(--accent);color:var(--accent)}
.pactions{display:flex;gap:8px;margin:0 0 14px;flex-wrap:wrap}
.pactions button{background:var(--surface);border:1px solid var(--line2);color:var(--ink-mid);border-radius:7px;padding:6px 12px;font-size:12px}
.pactions button:hover{border-color:var(--accent);color:var(--ink)}
.fz{background:none;border:1px solid var(--line2);color:var(--ink-dim);border-radius:5px;padding:2px 9px;font-size:10px;letter-spacing:.03em}
.fz:hover{border-color:var(--red);color:var(--red)}
.passo{flex-wrap:wrap}
.seg button{padding:4px 9px}
.hist{margin:6px 0 2px;border-top:1px dashed var(--line);padding-top:6px}
.hl{font-size:11.5px;color:var(--ink-mid);padding:3px 0;line-height:1.45}
.hd{font-family:var(--mono);font-size:10.5px;color:var(--accent);margin-right:4px}
.ha{color:var(--ink-dim);font-size:10.5px}
.rolebadge{font-size:10px;color:var(--ink-dim);letter-spacing:.06em;text-transform:uppercase}
@media print{
  .topbar,.tabs,.pactions,.ma-only,.back,.entfoot,.notein,.ro-note,.seg,.fz,.addbtn,.prio-pill.def{display:none!important}
  .shell{max-width:none;padding:0}
  body{background:#fff}
  .card,.panel,.faseblk,.kpis{break-inside:avoid;box-shadow:none}
  .foot{page-break-before:avoid}
}
.esp-h{display:flex;justify-content:space-between;align-items:center;margin:6px 0 10px}
.esp-h h3{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);margin:0;font-weight:600;display:flex;gap:9px;align-items:center}
.addbtn.sm{margin-top:0;padding:5px 11px;font-size:11.5px}
.rk-row{padding:13px 0;border-top:1px solid var(--line)}
.rk-row:first-child{border-top:none}
.rk-dim{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rk-niv{font-size:10px;color:#fff;padding:2px 9px;border-radius:5px;font-weight:600;letter-spacing:.03em}
.rk-tend{font-size:15px;color:var(--ink-mid);font-weight:700}
.rk-ctrls{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.rk-f{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rk-l{font-size:11px;color:var(--ink-dim);min-width:170px}
.rk-ac{font-size:12px;color:var(--ink-mid);background:var(--surface2);border:1px solid var(--line);border-radius:6px;padding:5px 9px;display:inline-flex;gap:7px;align-items:center;flex-wrap:wrap}
.pctm{display:inline-flex;align-items:center;gap:6px;margin-left:auto}
.pctm label{font-size:10.5px;color:var(--ink-dim)}
.pctm input{width:62px;padding:4px 7px;border:1px solid var(--line2);border-radius:6px;background:var(--surface);color:var(--ink);font-size:12px}
.heat{overflow-x:auto;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.heat table{border-collapse:collapse;width:100%;min-width:340px}
.heat th{font-size:10px;color:var(--ink-dim);font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:0 6px 8px;text-align:center}
.heat th.hh{text-align:left}
.heat td{padding:3px 6px;text-align:center}
.heat .hl-name{text-align:left;font-size:12.5px;color:var(--ink);cursor:pointer;white-space:nowrap;padding-right:14px}
.heat .hl-name:hover{color:var(--accent)}
.heat .hc{display:inline-block;width:26px;height:16px;border-radius:4px;border:1px solid rgba(0,0,0,.06)}
.heat-leg{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap}
.heat-leg span{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-mid)}
.heat-leg i{width:13px;height:13px;border-radius:3px;display:inline-block}
.fpm-w{display:inline-flex;align-items:center;gap:3px;color:var(--ink-mid);font-size:12px;font-weight:600}
.fpm{width:50px;padding:3px 6px;border:1px solid var(--line2);border-radius:6px;background:var(--surface);color:var(--ink);font-size:12.5px;font-weight:600;text-align:right}
.fpm:focus{border-color:var(--accent);outline:none}
.overlay{position:fixed;inset:0;background:rgba(10,14,22,.55);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:14px;max-width:760px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.modal .mh{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);border-radius:14px 14px 0 0}
.modal .mh h2{font-family:var(--display);font-size:18px;font-weight:600;margin:0}
.modal .mx{background:none;border:none;font-size:20px;color:var(--ink-mid);line-height:1}.modal .mx:hover{color:var(--ink)}
.modal .mb{padding:6px 22px 24px}
.modal .mb h3{font-family:var(--display);font-size:14px;font-weight:600;margin:20px 0 6px;color:var(--ink)}
.modal .mb p{font-size:13px;color:var(--ink-mid);margin:6px 0;line-height:1.65}
.modal .mb b{color:var(--ink);font-weight:600}
.modal .mb ul{margin:6px 0;padding-left:18px}.modal .mb li{font-size:13px;color:var(--ink-mid);margin:4px 0;line-height:1.55}
.modal .warn{background:var(--amber-soft);border:1px solid var(--amber);border-radius:8px;padding:11px 13px;margin:14px 0;font-size:12.5px;color:var(--ink)}
.modal.mform{max-width:440px}
.modal.mwide{max-width:1080px;width:96vw}
.cmpsec{margin-bottom:24px}
.cmpsec:last-child{margin-bottom:4px}
.cmpsec h4{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-dim);font-weight:600;margin:0 0 12px}
.cmpchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.cmpchip{font-family:var(--mono);font-size:11px;padding:4px 9px;border:1px solid var(--line2);border-radius:6px;background:var(--surface);color:var(--ink-mid)}
.cmpchip.on{background:var(--accent);color:var(--on-accent);border-color:var(--accent)}
#modalRoot svg text{font-family:var(--body)}
.uf-l{display:block;font-size:12px;color:var(--ink-mid);margin:14px 0 0;font-weight:600}
.uf-l input,.uf-l select,.uf-l textarea{display:block;width:100%;margin-top:6px;background:var(--surface);border:1px solid var(--line2);color:var(--ink);border-radius:8px;padding:9px 11px;font-size:13px;font-weight:400;font-family:var(--body)}
.uf-l textarea{min-height:62px;resize:vertical}
.uf-l input[type=date]{color-scheme:light}[data-theme=dark] .uf-l input[type=date]{color-scheme:dark}
.uf-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.uf-cancel{background:none;border:1px solid var(--line2);color:var(--ink-mid);border-radius:8px;padding:8px 16px;font-size:13px}
.uf-ok{background:var(--accent);border:1px solid var(--accent);color:var(--on-accent);border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600}
.uf-err{background:var(--red-soft);color:var(--red);border-radius:7px;padding:8px 11px;font-size:12.5px;margin-bottom:4px}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(12px);background:var(--ink);color:var(--bg);padding:10px 16px;border-radius:9px;font-size:13px;z-index:200;opacity:0;transition:.25s;box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:80%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
input[type=file]{display:none}
@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}.split,.subgrid{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}

function applyState(e,s){if(!e)return;const ps=e.passos;const oi=ps.findIndex(x=>x.kind==="o");
  if(s==="ok"){ps.forEach(x=>x.status="ok");return}
  if(s==="exec"){ps[0].status="exec";return}
  if(typeof s==="number"){ps.forEach((x,i)=>x.status=i<s?"ok":"nao");return}
  if(s.ag){ps.forEach((x,i)=>{if(i<oi)x.status="ok";});if(oi>=0){ps[oi].status="aguarda";ps[oi].desde=daysAgo(s.ag.dias);if(s.ag.org)ps[oi].orgao=s.ag.org;}return}

}

const NIVEL={alta:{baixo:"medio",medio:"alto",alto:"critico"},media:{baixo:"baixo",medio:"medio",alto:"alto"},baixa:{baixo:"baixo",medio:"baixo",alto:"medio"}};

function phaseCum(){const f=build("·","·",{}).fases.filter(x=>x.trilha==="reg");let tot=0;f.forEach(fa=>tot+=fa.itens.reduce((a,b)=>a+b.peso,0));let run=0;return f.map(fa=>{run+=fa.itens.reduce((a,b)=>a+b.peso,0);return{nome:fa.nome,pct:tot?run/tot:0}});}
function cmpBars(list){const rows=list.slice().sort((a,b)=>avancoReg(b)-avancoReg(a));const cum=phaseCum();const media=rows.length?rows.reduce((a,p)=>a+avancoReg(p),0)/rows.length:0;const W=880,padL=200,padR=56,rowH=30,top=20,axisH=40,plotW=W-padL-padR,H=rows.length*rowH+top+axisH;const X=pc=>padL+pc*plotW;const cb=top+rows.length*rowH;let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">`;s+=`<line x1="${X(0).toFixed(1)}" y1="${top}" x2="${X(0).toFixed(1)}" y2="${cb+4}" style="stroke:var(--line)"/>`;let prev=0;cum.forEach((c,i)=>{const x=X(c.pct),ctr=X((prev+c.pct)/2);s+=`<line x1="${x.toFixed(1)}" y1="${top}" x2="${x.toFixed(1)}" y2="${cb+4}" style="stroke:var(--line)" stroke-dasharray="2 3"/><text x="${ctr.toFixed(1)}" y="${cb+18}" text-anchor="middle" font-size="9.5" style="fill:var(--ink-dim)">${i+1}</text>`;prev=c.pct;});rows.forEach((p,i)=>{const y=top+i*rowH,cy=y+rowH/2,pc=avancoReg(p),bw=Math.max(2,pc*plotW),col=HEX[saude(p)],nm=p.nome.length>27?p.nome.slice(0,26)+"…":p.nome;s+=`<text x="${padL-12}" y="${(cy+4).toFixed(0)}" text-anchor="end" font-size="12.5" style="fill:var(--ink);cursor:pointer" onclick="closeModal();openP('${p.codigo}')">${esc(nm)}</text><rect x="${padL}" y="${(cy-7).toFixed(0)}" width="${plotW}" height="14" rx="4" style="fill:var(--surface2)"/><rect x="${padL}" y="${(cy-7).toFixed(0)}" width="${bw.toFixed(1)}" height="14" rx="4" style="fill:${col}"/><text x="${(padL+plotW+8).toFixed(0)}" y="${(cy+4).toFixed(0)}" font-size="12" font-weight="600" style="fill:var(--ink-mid)">${Math.round(pc*100)}%</text>`;});const mx=X(media);s+=`<line x1="${mx.toFixed(1)}" y1="${top-2}" x2="${mx.toFixed(1)}" y2="${cb+4}" style="stroke:var(--accent)" stroke-width="2"/><text x="${mx.toFixed(1)}" y="${(top-7).toFixed(0)}" text-anchor="middle" font-size="10" font-weight="600" style="fill:var(--accent)">média ${Math.round(media*100)}%</text>`;s+=`</svg>`;const leg=cum.map((c,i)=>`<span style="white-space:nowrap"><b style="color:var(--ink-mid)">${i+1}</b> ${esc(c.nome)}</span>`).join("&nbsp;·&nbsp;");s+=`<div style="font-size:10.5px;color:var(--ink-dim);margin-top:10px;line-height:1.8">${leg}</div>`;return s;}
function cmpLines(list){const ws=list.filter(p=>(p.snapshots||[]).length>=2);if(!ws.length)return `<div class="empty">A comparação temporal aparece quando há ao menos duas semanas registradas. Como o registro é automático e semanal, ela vai se formando sozinha.</div>`;const km={};ws.forEach(p=>p.snapshots.forEach(sn=>{const k=sn.key||sn.rotulo;km[k]={k,rot:sn.rotulo,data:sn.data||k};}));const keys=Object.values(km).sort((a,b)=>(a.data||a.k).localeCompare(b.data||b.k));const idx={};keys.forEach((kk,i)=>idx[kk.k]=i);let yMax=1;ws.forEach(p=>p.snapshots.forEach(sn=>{if(sn.pts>yMax)yMax=sn.pts;}));yMax=Math.max(20,Math.ceil(yMax/20)*20);const W=820,padL=44,padR=150,padT=12,padB=34,plotW=W-padL-padR,H=300,plotH=H-padT-padB;const X=i=>padL+(keys.length>1?i/(keys.length-1)*plotW:0),Y=v=>padT+plotH-(v/yMax)*plotH;let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">`;for(let g=0;g<=4;g++){const v=yMax*g/4,y=Y(v);s+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${padL+plotW}" y2="${y.toFixed(1)}" style="stroke:var(--line)"/><text x="${padL-6}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9" style="fill:var(--ink-dim)">${Math.round(v)}</text>`;}keys.forEach((kk,i)=>{if(keys.length>9&&i%2)return;s+=`<text x="${X(i).toFixed(1)}" y="${H-padB+16}" text-anchor="middle" font-size="9" style="fill:var(--ink-dim)">${esc(kk.rot)}</text>`;});ws.forEach((p,pi)=>{const col=cmpColors[pi%cmpColors.length];const pts=p.snapshots.map(sn=>[X(idx[sn.key||sn.rotulo]),Y(sn.pts)]).filter(pt=>pt[0]!=null&&!isNaN(pt[0]));if(pts.length>1)s+=`<polyline points="${pts.map(pt=>pt[0].toFixed(1)+','+pt[1].toFixed(1)).join(' ')}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>`;pts.forEach(pt=>s+=`<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="2.6" fill="${col}"/>`);});ws.forEach((p,pi)=>{const col=cmpColors[pi%cmpColors.length],ly=padT+8+pi*16;const nm=p.nome.length>15?p.nome.slice(0,14)+"…":p.nome;s+=`<rect x="${padL+plotW+14}" y="${ly-7}" width="9" height="9" rx="2" fill="${col}"/><text x="${padL+plotW+27}" y="${ly+1}" font-size="10.5" style="fill:var(--ink-mid)">${esc(p.codigo)} · ${esc(nm)}</text>`;});return s+`</svg>`;}
const RADAR_FASES=[["orig",["Originação"]],["dir",["Diretrizes","& Outorgas"]],["amb",["Ambiental &","Complementares"]],["anal",["Análise &",'"de acordo"']],["li",["Licença de","Instalação"]],["aprov",["Aprovar projetos","complementares"]],["dec",["Decreto"]]];
function radarVals(p){return RADAR_FASES.map(a=>{const f=p.fases.find(x=>x.id===a[0]);return f?faseTot(f).pct:0});}
function cmpRadar(sel){const N=RADAR_FASES.length,W=620,H=470,cx=W/2,cy=H/2+16,R=124;const ang=i=>-Math.PI/2+i*2*Math.PI/N;const pt=(i,r)=>[cx+Math.cos(ang(i))*R*r,cy+Math.sin(ang(i))*R*r];let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-width:620px">`;[0.25,0.5,0.75,1].forEach(r=>{const poly=[...Array(N)].map((_,i)=>pt(i,r)).map(pp=>pp[0].toFixed(1)+','+pp[1].toFixed(1)).join(' ');s+=`<polygon points="${poly}" fill="none" style="stroke:var(--line)"/>`;});RADAR_FASES.forEach((a,i)=>{const e=pt(i,1),l=pt(i,1.14),lx=l[0],ly=l[1],anc=lx<cx-6?'end':(lx>cx+6?'start':'middle'),lines=a[1],sdy=-(lines.length-1)*5.5;s+=`<line x1="${cx}" y1="${cy}" x2="${e[0].toFixed(1)}" y2="${e[1].toFixed(1)}" style="stroke:var(--line)"/>`;lines.forEach((ln,li)=>{s+=`<text x="${lx.toFixed(1)}" y="${(ly+sdy+li*11).toFixed(1)}" text-anchor="${anc}" font-size="9.5" style="fill:var(--ink-mid)">${esc(ln)}</text>`;});});sel.forEach((code,si)=>{const p=proj(code);if(!p)return;const col=cmpColors[si%cmpColors.length],v=radarVals(p);const poly=v.map((val,i)=>pt(i,Math.max(.02,val))).map(pp=>pp[0].toFixed(1)+','+pp[1].toFixed(1)).join(' ');s+=`<polygon points="${poly}" fill="${col}" fill-opacity="0.14" stroke="${col}" stroke-width="2"/>`;});sel.forEach((code,si)=>{const p=proj(code),col=cmpColors[si%cmpColors.length];s+=`<rect x="12" y="${14+si*18}" width="10" height="10" rx="2" fill="${col}"/><text x="28" y="${23+si*18}" font-size="11" style="fill:var(--ink-mid)">${esc(p?p.nome:code)}</text>`;});return s+`</svg>`;}
function renderCompare(){const root=document.getElementById("modalRoot");const act=DATA.filter(p=>p.status!=="arquivada");const chips=act.map(p=>`<button class="cmpchip ${cmpSel.includes(p.codigo)?'on':''}" onclick="toggleCmp('${p.codigo}')">${esc(p.codigo)}</button>`).join("");root.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal mwide"><div class="mh"><h2>Comparar frentes</h2><button class="mx" onclick="closeModal()">×</button></div><div class="mb"><div class="cmpsec"><h4>Ranking de avanço regulatório</h4>${cmpBars(act)}</div><div class="cmpsec"><h4>Comparativo por fase <span class="legend">% de conclusão · selecione 2 a 4 frentes</span></h4><div class="cmpchips">${chips}</div>${cmpRadar(cmpSel)}</div></div></div></div>`;}
function snapFoto(){if(!guard())return;const p=proj(cur);const a=avancoPts(p);uiForm({title:"Registrar semana manualmente",okText:"Salvar",fields:[{key:"rot",label:"Semana / rótulo (ex.: Sem 09/06 — para preencher histórico)",type:"text",value:weekLabel()},{key:"pts",label:"Pontos de avanço",type:"text",value:String(a.pts)}],onOk:v=>{let pts=parseInt(v.pts,10);if(isNaN(pts))pts=a.pts;if(!p.snapshots)p.snapshots=[];const rot=(v.rot||weekLabel()).trim();const ex=p.snapshots.find(s=>s.rotulo===rot);if(ex){ex.pts=pts;ex.total=a.total;ex.pct=a.total?pts/a.total:0;ex.manual=true;ex.data=today()}else{p.snapshots.push({rotulo:rot,pts,total:a.total,pct:a.total?pts/a.total:0,data:today(),manual:true})}p.snapshots.sort((x,y)=>(x.data||"").localeCompare(y.data||""));p.ultAt=today();save();closeModal();renderP()}})}
function delSnap(i){if(!guardM())return;const p=proj(cur);uiConfirm("Remover este snapshot do histórico de evolução?",()=>{p.snapshots.splice(i,1);touch(p);save();renderP()})}
function evolucaoHTML(p){const s=(p.snapshots||[]);if(!s.length)return `<div class="empty" style="margin-top:8px">O avanço é registrado automaticamente a cada período.${ED?` <a href="#" onclick="snapFoto();return false" style="color:var(--accent)">registrar histórico manual</a>`:''}</div>`;
  const last=s[s.length-1],prev=s.length>1?s[s.length-2]:null;
  const dpts=prev?last.pts-prev.pts:0,dpct=prev&&prev.pts?Math.round((last.pts-prev.pts)/prev.pts*100):0;
  const W=260,H=54,pad=7,vals=s.map(x=>x.pts),mx=Math.max(...vals,1),mn=Math.min(...vals,0),rng=(mx-mn)||1,step=s.length>1?(W-2*pad)/(s.length-1):0;
  const xy=s.map((x,i)=>[pad+i*step,H-pad-(x.pts-mn)/rng*(H-2*pad)]);
  const poly=xy.map(c=>c[0].toFixed(1)+","+c[1].toFixed(1)).join(" ");
  const dots=xy.map(c=>`<circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="3" fill="var(--accent)"/>`).join("");
  let h=`<div style="display:flex;align-items:baseline;gap:10px;margin-top:10px"><span style="font-family:var(--mono);font-weight:600;font-size:28px;line-height:1">${last.pts}</span><span style="font-size:11.5px;color:var(--ink-mid)">pts em ${esc(last.rotulo)}${last.total?' · de '+last.total:''}</span>`;
  if(prev)h+=`<span style="margin-left:auto;font-weight:600;font-size:12.5px;color:${dpts>0?'var(--green)':dpts<0?'var(--red)':'var(--ink-mid)'}">${dpts>0?'+':''}${dpts} pts${dpct?' · '+(dpct>0?'+':'')+dpct+'%':''}</span>`;
  h+=`</div><svg viewBox="0 0 ${W} ${H}" style="width:100%;height:54px;margin-top:8px;overflow:visible"><polyline points="${poly}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}</svg>`;
  h+=`<div style="margin-top:8px;border-top:1px solid var(--line);padding-top:6px">`+s.map((x,i)=>`<div class="row" style="padding:4px 0"><div style="font-size:12.5px">${esc(x.rotulo)}${x.manual?' <span class="legend">manual</span>':''}</div><div style="display:flex;align-items:center;gap:9px"><span style="font-family:var(--mono);font-weight:600">${x.pts}</span>${MA?`<button class="fz" onclick="delSnap(${i})" title="remover">×</button>`:''}</div></div>`).join("")+`</div>`;
  if(ED)h+=`<div style="margin-top:6px"><a href="#" onclick="snapFoto();return false" style="font-size:11.5px;color:var(--ink-dim)">registrar período manual…</a></div>`;
  return h}

function manualHTML(){return `<div class="overlay" onclick="if(event.target===this)closeManual()"><div class="modal">
  <div class="mh"><h2>Manual — Cockpit de Portfólio NNU</h2><button class="mx" onclick="closeManual()">×</button></div>
  <div class="mb">
    <p>Painel executivo da carteira do Urbanismo (NNU). Acompanha cada frente <b>da originação ao lançamento comercial</b>. Resume a EAP R22 em marcos executivos; <b>não substitui</b> a EAP nem o cronograma do projeto.</p>
    <h3>1. Conceitos</h3>
    <ul>
      <li><b>Gate</b> — portão de decisão entre fases (14 no total, até o Lançamento). A trilha no topo da frente mostra o gate concluído, o atual e os seguintes.</li>
      <li><b>Avanço</b> — percentual por marcos ponderados: cada entregável tem um peso; o total = soma dos pesos concluídos ÷ soma dos pesos aplicáveis.</li>
      <li><b>IPPE</b> — prontidão para a próxima etapa: o quanto falta para destravar o próximo gate. Diferente do avanço geral.</li>
      <li><b>IPPL</b> — prontidão para lançamento (esteira de produto/comercial). Aparece quando há itens de produto em andamento.</li>
      <li><b>Aguardando órgão</b> — pendência externa: já protocolamos, a análise está no órgão. Conta dias contra um <b>SLA</b> por órgão; ao ultrapassá-lo, vira atraso externo (vermelho).</li>
      <li><b>Pendência interna</b> — responsabilidade da equipe (falta decisão, documento, contratação, pagamento, minuta). É distinta de aguardar órgão.</li>
      <li><b>Bloqueador absoluto</b> — marco que trava o gate. Enquanto pendente, o IPPE aparece como “travado”.</li>
      <li><b>Não aplicável</b> — item que não existe naquela frente (ex.: barragem). Sai do cálculo sem zerar o percentual.</li>
      <li><b>Rito</b> — passos internos de cada entregável. Regulatório: Material técnico → Protocolo → Análise no órgão → Aprovação. Estudo: Elaboração → Revisão → Aprovação interna. Simples: um passo.</li>
    </ul>
    <h3>2. Como usar</h3>
    <ul>
      <li><b>Abrir uma frente</b> — clique no card da carteira. Use as abas Resumo, Entregáveis, Operação da semana e Riscos.</li>
      <li><b>Atualizar um entregável</b> — aba Entregáveis, clique no item para abrir os passos e marque o estado (não iniciado / em elaboração / aguardando / exigência / concluído). O avanço recalcula sozinho.</li>
      <li><b>Registrar pendência externa</b> — marque o passo “Análise no órgão” como aguardando, informe o órgão e a data de protocolo; o SLA já vem semeado e pode ser ajustado.</li>
      <li><b>Registrar pendência interna</b> — no rodapé do entregável, “Registrar pendência interna” e descreva o motivo.</li>
      <li><b>Marcar não aplicável</b> — no rodapé do entregável; ele sai do cálculo.</li>
      <li><b>Item especial</b> — botão “+ Item especial” na aba Entregáveis (barragem, DNPM/ANM, linha de transmissão, etc.).</li>
      <li><b>Operação da semana</b> — tarefas e alertas manuais com prazo e prioridade; <b>não alteram</b> o percentual técnico.</li>
      <li><b>Backup</b> — “Exportar” gera o arquivo JSON do estado; “Importar” recarrega. É o backup e a futura ponte para Sheets/Looker.</li>
    </ul>
    <h3>3. Níveis de acesso e senha</h3>
    <p>O painel abre em <b>somente leitura</b>. No botão “Acessar” você informa uma senha que define o nível:</p>
    <ul>
      <li><b>Visualização</b> (senha <code>123</code>) — navega e exporta; não altera nada.</li>
      <li><b>Edição simples</b> (senha <code>456</code>) — atualiza status, datas, pendências, observações, operação da semana e registra atualização. Não cria, arquiva, zera nem reordena a carteira.</li>
      <li><b>Master</b> (senha <code>opus890</code>) — tudo: nova frente, prioridade na carteira, status da frente (ativa/monitorada/arquivada/obras), item especial, zerar fase/frente, importar e restaurar.</li>
    </ul>
    <p>Também dá para abrir já num nível pela URL, anexando <code>?modo=view</code>, <code>?modo=edit</code> ou <code>?modo=master</code> ao endereço.</p>
    <div class="warn"><b>Atenção:</b> isto é <b>trava operacional</b>, não segurança real. Em um arquivo HTML que roda no navegador, quem tiver conhecimento técnico contorna (DevTools, edição da URL). E, por usar armazenamento local, <b>cada pessoa que abre o arquivo vê a própria cópia</b> — um link simples não compartilha os seus dados ao vivo. Para acesso externo real (dados compartilhados, log de quem alterou, papéis garantidos), o caminho é hospedar com backend: Google Sheets + Apps Script, Firebase ou Supabase. As senhas e os papéis ficam no código, nas constantes <code>PWD</code>.</div>
    <h3>4. Governança</h3>
    <ul>
      <li>O painel resume a carteira; a fonte técnica continua sendo a EAP R22, a RASCI REV13 e o Mapa de Governança.</li>
      <li>Os indicadores seguem os 5 KPIs oficiais do RASCI REV13.</li>
      <li>Após o lançamento, o acompanhamento migra para a rotina de Obras/Entrega; aqui fica apenas como referência.</li>
    </ul>
  </div></div></div>`}

    return `<label class="uf-l">${esc(f.label)}<input data-k="${f.key}" type="${f.type||'text'}" value="${esc(f.value||'')}" placeholder="${esc(f.placeholder||'')}"></label>`;
  }).join("");
  root.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal mform"><div class="mh"><h2>${esc(opts.title)}</h2><button class="mx" onclick="closeModal()">×</button></div><div class="mb"><div id="uf-err" class="uf-err" style="display:none"></div>${body}<div class="uf-actions"><button class="uf-cancel" onclick="closeModal()">Cancelar</button><button class="uf-ok" id="uf-ok">${esc(opts.okText||'Confirmar')}</button></div></div></div></div>`;
  const submit=()=>{const vals={};root.querySelectorAll("[data-k]").forEach(el=>vals[el.getAttribute("data-k")]=el.value);opts.onOk(vals)};
  document.getElementById("uf-ok").onclick=submit;
  root.querySelectorAll("input").forEach(inp=>inp.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();submit()}}));
  const first=root.querySelector("[data-k]");if(first)setTimeout(()=>{try{first.focus()}catch(e){}},30)}
function uiConfirm(msg,onOk){const root=document.getElementById("modalRoot");
  root.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal mform"><div class="mb" style="padding-top:22px"><p style="font-size:14px;color:var(--ink);margin:0 0 4px">${esc(msg)}</p><div class="uf-actions"><button class="uf-cancel" onclick="closeModal()">Cancelar</button><button class="uf-ok" id="uf-ok">Confirmar</button></div></div></div></div>`;
  document.getElementById("uf-ok").onclick=()=>{closeModal();onOk()}}
function toast(msg){const t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.classList.add("show"),10);setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),300)},2600)}

function applyTheme(t){document.documentElement.setAttribute("data-theme",t);try{localStorage.setItem(THEMEK,t)}catch(e){}}
(function(){try{const t=localStorage.getItem(THEMEK);if(t)document.documentElement.setAttribute("data-theme",t)}catch(e){}})();
function setRole(r){ROLE=r;ED=(r==="edit"||r==="master");MA=(r==="master");updateAccessUI()}
function updateAccessUI(){const b=document.getElementById("bAccess");const suf=GATE?" · trocar":" · sair";const lbl={view:GATE?"Acesso":"Acessar",edit:"Edição"+suf,master:"Master"+suf};b.textContent=lbl[ROLE]||"Acessar";b.classList.toggle("lock",ROLE!=="view"||GATE);document.querySelectorAll(".ma-only").forEach(el=>el.style.display=MA?"":"none")}
document.getElementById("bAccess").onclick=()=>{if(GATE){showGate();return}if(ROLE!=="view"){setRole("view");cur?renderP():renderHome();return}uiForm({title:"Acessar",okText:"Entrar",fields:[{key:"s",label:"Senha (visualização, edição ou master)",type:"password",placeholder:"Senha"}],onOk:v=>{const r=PWD[v.s];if(!r){ufError("Senha incorreta.");return}setRole(r);closeModal();cur?renderP():renderHome()}})};
document.getElementById("bPrint").onclick=()=>window.print();
document.getElementById("bManual").onclick=openManual;
document.getElementById("bCompare").onclick=openCompare;
document.getElementById("bTheme").onclick=()=>{applyTheme(document.documentElement.getAttribute("data-theme")==="light"?"dark":"light");cur?renderP():renderHome()};
document.getElementById("bNew").onclick=()=>{if(!guardM())return;uiForm({title:"Nova frente",okText:"Criar",fields:[{key:"nome",label:"Nome da frente",type:"text"},{key:"cod",label:"Código (sigla)",type:"text"}],onOk:v=>{if(!(v.nome||"").trim()){ufError("Informe o nome.");return}let c=((v.cod||"").trim()||v.nome.slice(0,4).toUpperCase());const p=build(v.nome.trim(),c||("P"+Date.now()),{estagio:"Prospecção / MOU",through:-1});let b=p.id,k=1;while(proj(p.id)){p.id=b+(++k);p.codigo=p.id}DATA.push(p);save();closeModal();openP(p.id)}})};
document.getElementById("bExp").onclick=()=>{const bl=new Blob([JSON.stringify(snapshot(),null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(bl);a.download="cockpit-urbanismo-"+today()+".json";a.click()};
document.getElementById("bImp").onclick=()=>{if(guardM())document.getElementById("fImp").click()};
document.getElementById("fImp").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{applySnapshot(JSON.parse(r.result));save();renderHome()}catch(x){toast("Arquivo inválido.")}};r.readAsText(f)};
document.getElementById("bReset").onclick=()=>{if(!guardM())return;uiConfirm("Restaurar os dados padrão? Isso substitui o que está salvo.",()=>{DATA=seed();save();renderHome()})};
document.getElementById("bPub").onclick=()=>{if(!guardM())return;const bl=new Blob([JSON.stringify(snapshot(),null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(bl);a.download="dados.json";a.click();toast("dados.json gerado — suba no GitHub para publicar.")};
function setRoleSilent(r){ROLE=r;ED=(r==="edit"||r==="master");MA=(r==="master")}
function renderAfterAuth(){updateAccessUI();cur?renderP():renderHome()}
function showGate(){document.getElementById("modalRoot").innerHTML=`<div class="overlay" style="background:var(--bg);align-items:center"><div class="modal mform" style="max-width:380px"><div class="mh"><h2>Cockpit NNU · acesso</h2></div><div class="mb"><div id="uf-err" class="uf-err" style="display:none"></div><label class="uf-l">Senha<input id="gate-pw" type="password" placeholder="Senha de acesso"></label><div class="uf-actions"><button class="uf-ok" id="gate-ok">Entrar</button></div><p style="font-size:11px;color:var(--ink-dim);margin-top:14px">Visualização, edição ou master conforme a senha.</p></div></div></div>`;
  const submit=()=>{const v=document.getElementById("gate-pw").value;const r=PWD[v];if(!r){ufError("Senha incorreta.");return}setRoleSilent(r);closeModal();renderAfterAuth()};
  document.getElementById("gate-ok").onclick=submit;const i=document.getElementById("gate-pw");i.addEventListener("keydown",e=>{if(e.key==="Enter")submit()});setTimeout(()=>{try{i.focus()}catch(e){}},40)}
async function boot(){
  let baked=null;try{const res=await fetch(DADOS_URL,{cache:"no-store"});if(res.ok)baked=await res.json()}catch(e){}
  let hasLocal=false;try{hasLocal=!!localStorage.getItem(STORE)}catch(e){}
  if(baked&&!hasLocal)applySnapshot(baked);
  try{autoSnapAll();save()}catch(e){}
  const q=new URLSearchParams(location.search);const m=(q.get("modo")||q.get("m")||q.get("acesso")||"").toLowerCase();
  if(m==="master"||m==="edit"||m==="view"){setRoleSilent(m);renderAfterAuth();return}
  if(GATE){showGate();return}
  renderAfterAuth()}
boot();
</script>
</body>
</html>
